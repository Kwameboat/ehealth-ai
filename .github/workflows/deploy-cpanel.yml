# Deploy eHealth AI — static PWA to cPanel + API on Railway

name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build environment
        env:
          SITE_URL: ${{ secrets.PUBLIC_APP_URL }}
          API_URL: ${{ secrets.RAILWAY_PUBLIC_URL }}
          APP_SECRET: ${{ secrets.APP_API_SECRET }}
        run: |
          echo "EXPO_PUBLIC_SITE_URL=${SITE_URL:-https://www.ehealthaigh.com}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_API_URL=${API_URL}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_APP_API_SECRET=${APP_SECRET}" >> $GITHUB_ENV
          echo "APP_API_SECRET=${APP_SECRET}" >> $GITHUB_ENV
          if [ -z "$API_URL" ]; then
            echo "::warning::RAILWAY_PUBLIC_URL not set — app will use same-origin API until Railway is configured"
            echo "EXPO_PUBLIC_API_URL=${SITE_URL:-https://www.ehealthaigh.com}" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Generate app-config.js
        run: node scripts/generate-app-config.mjs

      - name: Build PWA (web export)
        run: npm run build:web

      - name: Prepare static deploy bundle
        run: node scripts/prepare-static-deploy.mjs

      - name: Deploy static files via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./deploy-bundle/
          server-dir: ${{ secrets.FTP_REMOTE_DIR || './ehealth-ai/' }}
          dangerous-clean-slate: false

      - name: Publish static PWA on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: false
          script: |
            cd ~/ehealth-ai
            chmod +x cpanel/publish-static-pwa.sh 2>/dev/null || true
            bash cpanel/publish-static-pwa.sh || echo "WARN: publish-static-pwa failed"
