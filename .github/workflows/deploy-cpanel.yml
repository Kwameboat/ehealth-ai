# Deploy eHealth AI to cPanel (SFTP) on push to main
# Required GitHub Secrets: see DEPLOY.md → "GitHub Actions secrets"

name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build environment
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_APP_URL }}
          APP_SECRET: ${{ secrets.APP_API_SECRET }}
        run: |
          echo "EXPO_PUBLIC_API_URL=${PUBLIC_URL:-https://www.ehealthaigh.com}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_SITE_URL=${PUBLIC_URL:-https://www.ehealthaigh.com}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_APP_API_SECRET=${APP_SECRET}" >> $GITHUB_ENV
          echo "EXPO_PUBLIC_GOOGLE_SITE_VERIFICATION=EVGPzHgfdl7PWlqlelkWFexwIwDKMB2rVrO7sIGZ5N8" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Build PWA (web export)
        run: npm run build:web

      - name: Prepare deploy bundle
        run: node scripts/prepare-deploy.mjs

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./deploy-bundle/
          server-dir: ${{ secrets.FTP_REMOTE_DIR || './ehealth-ai/' }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/backend/.env
            **/backend/db/*.db
            **/backend/db/*.db-*

      - name: Server bootstrap via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: false
          script: |
            mkdir -p ~/ehealth-ai
            for v in ~/nodevenv/*/bin/activate; do [ -f "$v" ] && . "$v" && break; done
            for n in /opt/cpanel/ea-nodejs*/bin; do [ -x "$n/node" ] && export PATH="$n:$PATH" && break; done
            cd ~/ehealth-ai
            if [ ! -f package.json ]; then echo "No package.json yet"; exit 0; fi
            echo "Deploy OK $(date -u)" >> DEPLOYED_AT.txt
            chmod +x scripts/cpanel-post-deploy.sh 2>/dev/null || true
            bash scripts/cpanel-post-deploy.sh || echo "WARN: cpanel-post-deploy had errors (check logs)"
