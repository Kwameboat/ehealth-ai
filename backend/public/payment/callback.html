<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eHealth AI — Payment</title>
  <script src="/app-config.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0a0e17;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 400px;
      background: #151d2e;
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 16px;
      padding: 32px;
    }
    img { width: 120px; margin-bottom: 16px; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.5; }
    .ok { color: #22c55e; font-weight: 700; margin-top: 16px; }
    .err { color: #ef4444; font-weight: 700; margin-top: 16px; }
    a { color: #00C9A7; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/admin/logo.png" alt="eHealth AI" />
    <h1>Processing payment…</h1>
    <p id="msg">Please wait while we confirm your purchase.</p>
    <p id="status"></p>
    <p id="action" style="margin-top:16px"></p>
  </div>
  <script>
    const PENDING_REF_KEY = 'ehealth_pending_payment_ref';
    const TOKEN_KEY = 'medassistant_user_token';

    const params = new URLSearchParams(location.search);
    const reference = params.get('reference') || params.get('trxref');

    function getAppSecret() {
      return (window.__EHEALTH_CONFIG__ && window.__EHEALTH_CONFIG__.appApiSecret) || '';
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || '';
    }

    async function run() {
      if (!reference) {
        document.getElementById('status').className = 'err';
        document.getElementById('status').textContent = 'Missing payment reference.';
        return;
      }

      try {
        localStorage.setItem(PENDING_REF_KEY, reference);
      } catch (_) {}

      const token = getToken();
      const appSecret = getAppSecret();

      if (!token) {
        document.getElementById('msg').textContent =
          'Payment received. Open eHealth AI, go to Buy Points, and tap “Confirm payment”.';
        document.getElementById('status').className = 'ok';
        document.getElementById('status').textContent = 'Reference saved: ' + reference.slice(0, 24) + '…';
        document.getElementById('action').innerHTML =
          '<a href="/">Open app</a>';
        return;
      }

      if (!appSecret) {
        document.getElementById('status').className = 'err';
        document.getElementById('status').textContent =
          'App security key not loaded. Open the home page first, then return here or use Confirm payment in the app.';
        document.getElementById('action').innerHTML = '<a href="/">Open app</a>';
        return;
      }

      try {
        const headers = {
          Authorization: 'Bearer ' + token,
          'Content-Type': 'application/json',
          'X-MedAssistant-Key': appSecret,
        };

        const r = await fetch('/api/payments/verify/' + encodeURIComponent(reference), { headers });
        const data = await r.json();
        if (!r.ok) throw new Error(data?.error?.message || 'Verification failed');

        try {
          localStorage.removeItem(PENDING_REF_KEY);
          const raw = localStorage.getItem('medassistant_user');
          if (raw) {
            const user = JSON.parse(raw);
            user.pointsBalance = data.balance;
            localStorage.setItem('medassistant_user', JSON.stringify(user));
          }
        } catch (_) {}

        document.getElementById('msg').textContent = 'Your points have been added successfully.';
        document.getElementById('status').className = 'ok';
        document.getElementById('status').textContent =
          '+' + data.pointsAdded + ' points · Balance: ' + data.balance;
        document.getElementById('action').innerHTML =
          '<a href="/">Back to app</a>';
      } catch (e) {
        document.getElementById('msg').textContent = 'Could not confirm payment automatically.';
        document.getElementById('status').className = 'err';
        document.getElementById('status').textContent = e.message;
        document.getElementById('action').innerHTML =
          'Open <a href="/">Buy Points</a> and tap <strong>Confirm payment</strong>.';
      }
    }
    run();
  </script>
</body>
</html>
