<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eHealth AI — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/styles.css?v=10" />
  <style>.hidden{display:none!important}.login-view.hidden,.shell.hidden{display:none!important}</style>
  <script>
    // Always use www — bare domain 301 breaks POST /admin/api/login
    if (location.hostname === 'ehealthaigh.com') {
      location.replace('https://www.ehealthaigh.com' + location.pathname + location.search + location.hash);
    }
  </script>
</head>
<body>
  <!-- Login -->
  <div id="login-view" class="login-view">
    <div class="login-card">
      <div class="login-brand">
        <img src="/admin/logo.png" alt="eHealth AI" class="login-logo" />
        <p>Admin — 360° System Control</p>
      </div>
      <form id="login-form" method="post" action="#" autocomplete="on" onsubmit="return false;">
        <label class="field-label">Username<input type="text" id="login-username" autocomplete="username" required /></label>
        <label class="field-label">Password<input type="password" id="login-password" autocomplete="current-password" required /></label>
        <p id="login-error" class="error-msg hidden"></p>
        <button type="submit" class="btn btn-primary btn-block">Sign in to dashboard</button>
      </form>
    </div>
  </div>

  <!-- App shell -->
  <div id="app-view" class="shell hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="/admin/logo.png" alt="eHealth AI" class="sidebar-logo" />
        <div>
          <strong>eHealth AI</strong>
          <span class="node-status"><span class="dot pulse"></span> AI NODE: ACTIVE</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button type="button" class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
        <button type="button" class="nav-item" data-page="analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 5-8"/></svg>
          Analytics
        </button>
        <button type="button" class="nav-item" data-page="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Patient Logs
        </button>
        <button type="button" class="nav-item" data-page="points">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.58-3.25 3.93L12 22l-.75-12.07A4.001 4.001 0 0 1 12 2z"/></svg>
          Medical AI
        </button>
        <button type="button" class="nav-item" data-page="system">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          System Status
        </button>
        <button type="button" class="nav-item" data-page="packages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
          Points Shop
        </button>
        <button type="button" class="nav-item" data-page="doctors">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6"/><path d="M19 8v6"/></svg>
          Doctors
        </button>
        <button type="button" class="nav-item" data-page="broadcasts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Broadcasts
        </button>
        <button type="button" class="nav-item" data-page="payments">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Payments
        </button>
        <button type="button" class="nav-item" data-page="delivery">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Delivery
        </button>
        <button type="button" class="nav-item" data-page="whatsapp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          WhatsApp
        </button>
        <button type="button" class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Settings & Keys
        </button>
      </nav>

      <div class="sidebar-footer">
        <button type="button" class="btn-emergency" id="emergency-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Emergency Override
        </button>
        <button type="button" class="sidebar-link" id="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="top-header">
        <h1 id="page-title" class="page-heading">Clinical Intelligence AI</h1>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="global-search" placeholder="Search patient ID or node…" />
        </div>
        <div class="header-actions">
          <button type="button" class="icon-btn" title="Notifications"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
          <button type="button" class="icon-btn" title="Settings" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
          <div class="admin-profile">
            <div class="admin-meta">
              <strong id="admin-name">Admin</strong>
              <span>System Administrator</span>
            </div>
            <div class="avatar" id="admin-avatar">AD</div>
          </div>
        </div>
      </header>

      <main class="page-content">
        <section id="page-dashboard" class="page"></section>
        <section id="page-analytics" class="page hidden"></section>
        <section id="page-users" class="page hidden"></section>
        <section id="page-points" class="page hidden"></section>
        <section id="page-system" class="page hidden"></section>
        <section id="page-packages" class="page hidden"></section>
        <section id="page-doctors" class="page hidden"></section>
        <section id="page-broadcasts" class="page hidden"></section>
        <section id="page-payments" class="page hidden"></section>
        <section id="page-delivery" class="page hidden"></section>
        <section id="page-whatsapp" class="page hidden"></section>
        <section id="page-settings" class="page hidden"></section>
      </main>
    </div>

    <button type="button" class="fab" id="fab-btn" title="Quick action">+</button>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="modal-confirm">Save</button>
      </div>
    </div>
  </div>

  <script src="/admin/app.js?v=20"></script>
  <script src="/admin/whatsapp-admin.js?v=11"></script>
  <script src="/admin/settings-ext.js?v=2"></script>
  <script>
    window.addEventListener('error', function (e) {
      var el = document.getElementById('login-error');
      if (!el) return;
      el.textContent = 'Admin failed to load: ' + (e.message || 'script error') + '. Hard-refresh (Ctrl+Shift+R).';
      el.classList.remove('hidden');
    });
  </script>
</body>
</html>
