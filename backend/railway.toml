# Railway — eHealth AI API (backend only)
# Attach a volume at /data in the Railway dashboard, then set DATABASE_PATH=/data/medassistant.db

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
